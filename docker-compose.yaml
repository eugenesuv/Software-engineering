services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: car_rental
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d car_rental"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/car_rental
    ports:
      - "8080:8080"
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --db-url
      - postgresql://postgres:postgres@postgres:5432/car_rental
      - --jwt-secret
      - docker-dev-secret
      - --manager-password
      - Manager123!

volumes:
  postgres_data:
